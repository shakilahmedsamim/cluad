backend:
  name: github
  repo: shakilahmedsamim/cluad
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

media_library:
  name: uploadcare

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"

      - label: "Image"
        name: "image"
        widget: "image"

      - label: "Body"
        name: "body"
        widget: "markdown"
